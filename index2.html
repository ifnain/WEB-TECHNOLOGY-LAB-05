<!DOCTYPE html>
<html>
<head>
    <title>Array Based Web Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            width: 400px;
            padding: 20px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 8px 15px;
            font-size: 14px;
            margin-top: 10px;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            text-align: left;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Array Operations</h2>
    <button onclick="processArray()">Show Results</button>

    <div class="result" id="output"></div>
</div>

<script>
    function processArray() {
        let numbers = [12, 5, 8, 20, 3, 15];
        let sum = 0;
        for (let i = 0; i < numbers.length; i++) {
            sum += numbers[i];
        }
        let largest = numbers[0];
        for (let i = 1; i < numbers.length; i++) {
            if (numbers[i] > largest) {
                largest = numbers[i];
            }
        }
        let reversed = [...numbers].reverse();
        document.getElementById("output").innerHTML =
            "Original Array: " + numbers + "<br><br>" +
            "Sum of Numbers: " + sum + "<br><br>" +
            "Largest Number: " + largest + "<br><br>" +
            "Reversed Array: " + reversed;
    }
</script>

</body>
</html>
